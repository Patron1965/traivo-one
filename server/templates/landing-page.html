<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver Core - API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #F8F9FA; color: #1C2833; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 48px; max-width: 480px; text-align: center; border: 1px solid #EAECEE; }
    h1 { font-size: 28px; margin-bottom: 8px; color: #1B4F72; }
    p { font-size: 16px; color: #5D6D7E; margin-bottom: 24px; }
    .status { display: inline-flex; align-items: center; gap: 8px; background: #EAFAF1; color: #27AE60; padding: 8px 16px; border-radius: 100px; font-weight: 600; font-size: 14px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #27AE60; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Driver Core API</h1>
    <p>Backend-server f&ouml;r Unicorn Driver Core mobilapp</p>
    <div class="status"><span class="dot"></span> API Active</div>
  </div>
</body>
</html>
