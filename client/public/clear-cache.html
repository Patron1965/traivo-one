<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rensar cache...</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
           display: flex; align-items: center; justify-content: center; 
           min-height: 100vh; margin: 0; background: #f5f5f5; }
    .container { text-align: center; padding: 2rem; }
    .spinner { width: 50px; height: 50px; border: 4px solid #ddd; 
               border-top-color: #3B82F6; border-radius: 50%; 
               animation: spin 1s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.5rem; color: #333; margin-bottom: 0.5rem; }
    p { color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Rensar cache...</h1>
    <p id="status">Avregistrerar service worker...</p>
  </div>
  <script>
    async function clearAll() {
      const status = document.getElementById('status');
      
      // Unregister all service workers
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (const registration of registrations) {
          await registration.unregister();
        }
        status.textContent = 'Service worker avregistrerad. Rensar caches...';
      }
      
      // Clear all caches
      if ('caches' in window) {
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(name => caches.delete(name)));
        status.textContent = 'Alla caches rensade!';
      }
      
      // Clear localStorage related to the app
      localStorage.removeItem('fieldAppSession');
      
      status.textContent = 'Klart! Omdirigerar till appen...';
      
      // Redirect to the field app
      setTimeout(() => {
        window.location.href = '/field';
      }, 1500);
    }
    
    clearAll().catch(err => {
      document.getElementById('status').textContent = 'Fel: ' + err.message;
    });
  </script>
</body>
</html>
